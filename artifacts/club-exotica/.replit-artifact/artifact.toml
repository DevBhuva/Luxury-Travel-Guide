kind = "web"
previewPath = "/"
title = "Club Exotica"
version = "1.0.0"
id = "artifacts/club-exotica"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25106

[services.development]
run = "pnpm --filter @workspace/club-exotica run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/club-exotica", "run", "build" ]
serve = "static"
publicDir = "artifacts/club-exotica/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25106"
BASE_PATH = "/"
